<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Mali</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <header class="site-header">
    <div class="container nav-container">
      <a href="index.html" class="logo">Mali</a>

      <button class="menu-toggle" id="menuToggle" aria-label="Open navigation menu">☰</button>

      <nav class="main-nav" id="mainNav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about-us.html">About</a></li>
          <li><a href="expenses.html" class="protected-link">Expenses</a></li>
          <li><a href="report.html" class="protected-link">Report</a></li>
          <li><a href="contact-us.html">Contact</a></li>
        </ul>
      </nav>

      <div class="nav-actions">
        <a href="login.html" class="login-link guest-only">Login</a>
        <a href="register.html" class="btn btn-primary guest-only">Get Started</a>
        <a href="#" onclick="logout()" class="btn btn-primary user-only">Logout</a>
      </div>
    </div>
  </header>

  <main class="inner-page">
    <section class="page-hero small-hero">
      <div class="container">
        <p class="section-label">Welcome Back</p>
        <h1>Login to Mali</h1>
        <p class="page-description">
          Access your account to manage your expenses and view your financial report.
        </p>
      </div>
    </section>
    <section class="contact-section">
      <h2 class="visually-hidden">Login Form</h2>
      <div class="container">
        <div class="form-box login-box">
          <form id="loginForm" class="styled-form" novalidate>
            <div class="form-group">
              <label for="loginEmail">Email Address</label>
              <input type="email" id="loginEmail" name="loginEmail" placeholder="example@email.com" required />
              <small class="error-message"></small>
            </div>

            <div class="form-group">
              <label for="loginPassword">Password</label>
              <input type="password" id="loginPassword" name="loginPassword" placeholder="Enter your password" required
                minlength="6" />
              <small class="error-message"></small>
            </div>

            <button type="submit" class="btn btn-primary form-submit-btn">Login</button>

            <p id="loginStatus" class="form-status"></p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <p>&copy; 2026 Mali. All rights reserved.</p>
      <p>Designed for CCSW321 Web Development Project.</p>
    </div>
  </footer>
  <script type="module" src="../js/script.js"></script>
</body>

</html>
